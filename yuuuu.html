<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钓鱼大亨</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        
        body {
            background: linear-gradient(to bottom, #87CEEB, #E0F7FF);
            color: #333;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #1a5f7a;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }
        
        .game-layout {
            display: flex;
            width: 100%;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .game-area {
            flex: 3;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            position: relative;
            height: 600px;
        }
        
        .game-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .info-panel {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .info-panel h3 {
            color: #1a5f7a;
            margin-bottom: 15px;
            font-size: 1.4rem;
            border-bottom: 2px solid #87CEEB;
            padding-bottom: 8px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        
        .stat {
            background-color: #f0f9ff;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a5f7a;
        }
        
        #money {
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .game-scene {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }
        
        .sky {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: linear-gradient(to bottom, #87CEEB, #B3E0FF);
        }
        
        .sun {
            position: absolute;
            top: 30px;
            right: 80px;
            width: 60px;
            height: 60px;
            background-color: #FFD700;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
        }
        
        .cloud {
            position: absolute;
            background-color: white;
            border-radius: 50px;
            opacity: 0.8;
        }
        
        .cloud1 {
            width: 120px;
            height: 50px;
            top: 40px;
            left: 10%;
            animation: cloudMove 60s linear infinite;
        }
        
        .cloud2 {
            width: 80px;
            height: 35px;
            top: 80px;
            left: 40%;
            animation: cloudMove 80s linear infinite;
        }
        
        .cloud3 {
            width: 100px;
            height: 40px;
            top: 60px;
            left: 70%;
            animation: cloudMove 70s linear infinite;
        }
        
        @keyframes cloudMove {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(1200px); }
        }
        
        .water {
            position: absolute;
            top: 40%;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to bottom, #4D96FF, #1a5f7a);
            overflow: hidden;
        }
        
        .water-surface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: rgba(77, 150, 255, 0.7);
            animation: wave 3s ease-in-out infinite alternate;
        }
        
        @keyframes wave {
            0% { transform: translateY(0); }
            100% { transform: translateY(-5px); }
        }
        
        .fishing-rod {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            transition: transform 0.1s;
        }
        
        .rod-handle {
            width: 10px;
            height: 200px;
            background-color: #8B4513;
            border-radius: 5px;
            position: relative;
        }
        
        .rod-tip {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 300px;
            background-color: #D2B48C;
            border-radius: 2px;
        }
        
        .fishing-line {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 2px;
            height: 0;
            background-color: rgba(255, 255, 255, 0.8);
            transform-origin: top center;
            transform: translateX(-50%);
            transition: height 0.3s;
        }
        
        .hook {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 20px;
            background-color: #C0C0C0;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            border-radius: 2px;
            z-index: 5;
        }
        
        .bait {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            background-color: #FF9999;
            border-radius: 50%;
            z-index: 6;
        }
        
        .fish {
            position: absolute;
            width: 60px;
            height: 30px;
            transition: all 0.5s ease;
            cursor: pointer;
            z-index: 4;
            will-change: transform;
        }
        
        .fish-body {
            width: 100%;
            height: 100%;
            background-color: #FF6B6B;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            position: relative;
        }
        
        .fish-tail {
            position: absolute;
            right: -10px;
            top: 5px;
            width: 20px;
            height: 30px;
            background-color: #FF6B6B;
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
        }
        
        .fish-fin {
            position: absolute;
            top: 5px;
            left: 15px;
            width: 15px;
            height: 10px;
            background-color: #FF8E8E;
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
        }
        
        .fish-eye {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
        }
        
        .fish-eye::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 4px;
            height: 4px;
            background-color: black;
            border-radius: 50%;
        }
        
        .bubbles {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .bubble {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: bubbleUp linear infinite;
        }
        
        @keyframes bubbleUp {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: translateY(-600px) scale(1.2);
                opacity: 0;
            }
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            width: 100%;
        }
        
        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            justify-content: center;
        }
        
        #castBtn {
            background-color: #4CAF50;
            color: white;
        }
        
        #castBtn:hover:not(:disabled) {
            background-color: #45a049;
            transform: translateY(-3px);
        }
        
        #castBtn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        #shopBtn {
            background-color: #FF9800;
            color: white;
        }
        
        #shopBtn:hover {
            background-color: #e68a00;
            transform: translateY(-3px);
        }
        
        .shop-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }
        
        .shop-content {
            background-color: white;
            width: 90%;
            max-width: 800px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .shop-header h2 {
            color: #1a5f7a;
            font-size: 2rem;
        }
        
        .close-shop {
            background-color: #f44336;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .shop-items {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        
        .shop-item {
            background-color: #f9f9f9;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s;
            border: 2px solid #e0e0e0;
        }
        
        .shop-item:hover {
            transform: translateY(-5px);
            border-color: #87CEEB;
        }
        
        .item-icon {
            font-size: 2.5rem;
            color: #1a5f7a;
            margin-bottom: 15px;
        }
        
        .item-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #333;
        }
        
        .item-description {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 15px;
            height: 60px;
        }
        
        .item-cost {
            font-size: 1.2rem;
            color: #FF9800;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .buy-btn {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background-color 0.3s;
        }
        
        .buy-btn:hover:not(:disabled) {
            background-color: #45a049;
        }
        
        .buy-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .catch-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #1a5f7a;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            z-index: 20;
            display: none;
            text-align: center;
        }
        
        .fish-caught {
            animation: caught 1.5s ease-out;
        }
        
        @keyframes caught {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0.5); opacity: 0; }
        }
        
        .inventory {
            margin-top: 20px;
        }
        
        .inventory-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .inventory-item {
            background-color: #f0f9ff;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 120px;
        }
        
        .inventory-icon {
            font-size: 1.5rem;
            color: #1a5f7a;
        }
        
        footer {
            margin-top: 30px;
            text-align: center;
            color: #1a5f7a;
            font-size: 0.9rem;
            width: 100%;
        }
        
        @media (max-width: 992px) {
            .game-layout {
                flex-direction: column;
            }
            
            .game-area {
                height: 500px;
            }
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            
            .game-area {
                height: 400px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            button {
                width: 100%;
                max-width: 300px;
            }
            
            .stats {
                grid-template-columns: 1fr;
            }
        }
        
        /* 鱼的类型样式 */
        .fish-type1 .fish-body { background-color: #FF6B6B; }
        .fish-type2 .fish-body { background-color: #4ECDC4; }
        .fish-type3 .fish-body { background-color: #FFD166; }
        .fish-type4 .fish-body { background-color: #06D6A0; }
        .fish-type5 .fish-body { background-color: #118AB2; }
        
        .fish-type1 .fish-tail { background-color: #FF5252; }
        .fish-type2 .fish-tail { background-color: #2BBBB5; }
        .fish-type3 .fish-tail { background-color: #FFC145; }
        .fish-type4 .fish-tail { background-color: #00C896; }
        .fish-type5 .fish-tail { background-color: #0D7AA3; }
        
        /* 进度条 */
        .progress-container {
            width: 100%;
            height: 20px;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-fish"></i> 钓鱼大亨</h1>
            <p>抛竿钓鱼，收集各种鱼类，升级装备，成为钓鱼大师！</p>
        </header>
        
        <div class="game-layout">
            <div class="game-area">
                <div class="game-scene">
                    <!-- 天空部分 -->
                    <div class="sky">
                        <div class="sun"></div>
                        <div class="cloud cloud1"></div>
                        <div class="cloud cloud2"></div>
                        <div class="cloud cloud3"></div>
                    </div>
                    
                    <!-- 钓鱼竿 -->
                    <div class="fishing-rod" id="fishingRod">
                        <div class="rod-handle">
                            <div class="rod-tip"></div>
                        </div>
                        <div class="fishing-line" id="fishingLine"></div>
                        <div class="hook" id="hook"></div>
                        <div class="bait" id="bait"></div>
                    </div>
                    
                    <!-- 水面部分 -->
                    <div class="water">
                        <div class="water-surface"></div>
                        <div class="bubbles" id="bubbles"></div>
                        <!-- 鱼将通过JS生成在这里 -->
                        <div id="fishContainer"></div>
                    </div>
                    
                    <!-- 捕获消息 -->
                    <div class="catch-message" id="catchMessage"></div>
                </div>
            </div>
            
            <div class="game-info">
                <div class="info-panel">
                    <h3><i class="fas fa-chart-line"></i> 游戏状态</h3>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-label">金钱</div>
                            <div class="stat-value" id="money">$0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">总捕获</div>
                            <div class="stat-value" id="totalCaught">0</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">竿等级</div>
                            <div class="stat-value" id="rodLevel">1</div>
                        </div>
                        <div class="stat">
                            <div class="stat-label">饵料等级</div>
                            <div class="stat-value" id="baitLevel">1</div>
                        </div>
                    </div>
                    
                    <div class="progress-container">
                        <div class="progress-bar" id="catchProgress"></div>
                    </div>
                </div>
                
                <div class="info-panel">
                    <h3><i class="fas fa-trophy"></i> 今日收获</h3>
                    <div id="recentCatches">
                        <p style="text-align: center; color: #888;">尚未捕获任何鱼</p>
                    </div>
                </div>
                
                <div class="info-panel inventory">
                    <h3><i class="fas fa-box-open"></i> 装备</h3>
                    <div class="inventory-items">
                        <div class="inventory-item">
                            <i class="fas fa-fishing-rod inventory-icon"></i>
                            <div>
                                <div>钓鱼竿</div>
                                <div>等级 <span id="invRodLevel">1</span></div>
                            </div>
                        </div>
                        <div class="inventory-item">
                            <i class="fas fa-worm inventory-icon"></i>
                            <div>
                                <div>饵料</div>
                                <div>等级 <span id="invBaitLevel">1</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="controls">
            <button id="castBtn">
                <i class="fas fa-water"></i> 抛竿钓鱼
            </button>
            <button id="shopBtn">
                <i class="fas fa-shopping-cart"></i> 商店
            </button>
        </div>
        
        <!-- 商店模态框 -->
        <div class="shop-modal" id="shopModal">
            <div class="shop-content">
                <div class="shop-header">
                    <h2><i class="fas fa-store"></i> 钓鱼商店</h2>
                    <button class="close-shop" id="closeShop">&times;</button>
                </div>
                <div class="shop-items" id="shopItems">
                    <!-- 商店物品将通过JS生成 -->
                </div>
            </div>
        </div>
        
        <footer>
            <p>钓鱼大亨游戏 - 使用HTML、CSS和JavaScript创建 | 点击抛竿按钮开始钓鱼，点击鱼进行捕获</p>
        </footer>
    </div>

    <script>
        // 游戏变量
        let money = 0;
        let totalCaught = 0;
        let rodLevel = 1;
        let baitLevel = 1;
        let isCasting = false;
        let isReeling = false;
        let currentFish = null;
        let fishInWater = [];
        let recentCatches = [];
        
        // 鱼的类型和属性
        const fishTypes = [
            { name: "小丑鱼", value: 10, color: "#FF6B6B", rarity: 60 },
            { name: "蓝吊鱼", value: 20, color: "#4ECDC4", rarity: 40 },
            { name: "黄金鱼", value: 50, color: "#FFD166", rarity: 20 },
            { name: "彩虹鱼", value: 100, color: "#06D6A0", rarity: 10 },
            { name: "帝王鱼", value: 200, color: "#118AB2", rarity: 5 }
        ];
        
        // 商店物品
        const shopItems = [
            { id: 1, name: "升级钓鱼竿", description: "提高钓鱼成功率，减少等待时间", cost: 100, icon: "fas fa-fishing-rod", type: "rod" },
            { id: 2, name: "升级饵料", description: "吸引更稀有、更值钱的鱼类", cost: 150, icon: "fas fa-worm", type: "bait" },
            { id: 3, name: "豪华鱼竿", description: "显著提高钓鱼成功率", cost: 500, icon: "fas fa-anchor", type: "rod" },
            { id: 4, name: "高级饵料", description: "极大提高稀有鱼出现概率", cost: 800, icon: "fas fa-dragon", type: "bait" },
            { id: 5, name: "渔网", description: "一次性捕获多条鱼", cost: 1200, icon: "fas fa-network-wired", type: "net" },
            { id: 6, name: "钓鱼大师执照", description: "解锁所有鱼类，永久提高收益", cost: 3000, icon: "fas fa-certificate", type: "license" }
        ];
        
        // DOM元素
        const moneyElement = document.getElementById('money');
        const totalCaughtElement = document.getElementById('totalCaught');
        const rodLevelElement = document.getElementById('rodLevel');
        const baitLevelElement = document.getElementById('baitLevel');
        const invRodLevelElement = document.getElementById('invRodLevel');
        const invBaitLevelElement = document.getElementById('invBaitLevel');
        const castBtn = document.getElementById('castBtn');
        const shopBtn = document.getElementById('shopBtn');
        const fishingRod = document.getElementById('fishingRod');
        const fishingLine = document.getElementById('fishingLine');
        const hook = document.getElementById('hook');
        const bait = document.getElementById('bait');
        const fishContainer = document.getElementById('fishContainer');
        const shopModal = document.getElementById('shopModal');
        const closeShopBtn = document.getElementById('closeShop');
        const shopItemsContainer = document.getElementById('shopItems');
        const catchMessage = document.getElementById('catchMessage');
        const recentCatchesElement = document.getElementById('recentCatches');
        const catchProgress = document.getElementById('catchProgress');
        const bubbles = document.getElementById('bubbles');
        
        // 初始化游戏
        function initGame() {
            updateUI();
            createBubbles();
            generateFish();
            setupShop();
            
            // 加载保存的游戏数据
            loadGame();
        }
        
        // 创建气泡效果
        function createBubbles() {
            // 清除现有气泡
            bubbles.innerHTML = '';
            
            // 创建多个气泡
            for (let i = 0; i < 20; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                // 随机大小和位置
                const size = Math.random() * 20 + 5;
                bubble.style.width = `${size}px`;
                bubble.style.height = `${size}px`;
                bubble.style.left = `${Math.random() * 100}%`;
                bubble.style.bottom = `-${size}px`;
                
                // 随机动画持续时间
                const duration = Math.random() * 10 + 10;
                bubble.style.animationDuration = `${duration}s`;
                
                // 随机延迟
                const delay = Math.random() * 5;
                bubble.style.animationDelay = `${delay}s`;
                
                bubbles.appendChild(bubble);
            }
        }
        
        // 生成鱼
        function generateFish() {
            // 清除现有鱼
            fishContainer.innerHTML = '';
            fishInWater = [];
            
            // 生成5-8条鱼
            const fishCount = Math.floor(Math.random() * 4) + 5;
            
            for (let i = 0; i < fishCount; i++) {
                // 随机选择鱼类型（考虑稀有度）
                let fishTypeIndex = 0;
                const rarityRoll = Math.random() * 100;
                
                if (rarityRoll < fishTypes[4].rarity * baitLevel) {
                    fishTypeIndex = 4; // 帝王鱼
                } else if (rarityRoll < fishTypes[3].rarity * baitLevel) {
                    fishTypeIndex = 3; // 彩虹鱼
                } else if (rarityRoll < fishTypes[2].rarity * baitLevel) {
                    fishTypeIndex = 2; // 黄金鱼
                } else if (rarityRoll < fishTypes[1].rarity * baitLevel) {
                    fishTypeIndex = 1; // 蓝吊鱼
                } else {
                    fishTypeIndex = 0; // 小丑鱼
                }
                
                const fishType = fishTypes[fishTypeIndex];
                
                // 创建鱼元素
                const fish = document.createElement('div');
                fish.className = `fish fish-type${fishTypeIndex + 1}`;
                fish.dataset.type = fishTypeIndex;
                fish.dataset.value = fishType.value;
                
                // 随机位置（在水的区域内）
                const left = Math.random() * 80 + 10; // 10% - 90%
                const top = Math.random() * 60 + 30; // 30% - 90%
                
                fish.style.left = `${left}%`;
                fish.style.top = `${top}%`;
                
                // 随机游动方向
                const direction = Math.random() > 0.5 ? 1 : -1;
                fish.style.transform = `scaleX(${direction})`;
                
                // 添加鱼体部分
                const fishBody = document.createElement('div');
                fishBody.className = 'fish-body';
                
                const fishTail = document.createElement('div');
                fishTail.className = 'fish-tail';
                
                const fishFin = document.createElement('div');
                fishFin.className = 'fish-fin';
                
                const fishEye = document.createElement('div');
                fishEye.className = 'fish-eye';
                
                fishBody.appendChild(fishTail);
                fishBody.appendChild(fishFin);
                fishBody.appendChild(fishEye);
                fish.appendChild(fishBody);
                
                // 添加点击事件
                fish.addEventListener('click', () => catchFish(fish));
                
                fishContainer.appendChild(fish);
                fishInWater.push({
                    element: fish,
                    type: fishTypeIndex,
                    value: fishType.value,
                    direction: direction,
                    speed: Math.random() * 2 + 1
                });
            }
            
            // 开始鱼游动动画
            animateFish();
        }
        
        // 鱼游动动画
        function animateFish() {
            fishInWater.forEach(fish => {
                let left = parseFloat(fish.element.style.left);
                
                // 更新位置
                left += fish.direction * fish.speed * 0.5;
                
                // 边界检测
                if (left > 90) {
                    left = 90;
                    fish.direction = -1;
                    fish.element.style.transform = 'scaleX(-1)';
                } else if (left < 10) {
                    left = 10;
                    fish.direction = 1;
                    fish.element.style.transform = 'scaleX(1)';
                }
                
                fish.element.style.left = `${left}%`;
                
                // 随机改变方向
                if (Math.random() < 0.01) {
                    fish.direction *= -1;
                    fish.element.style.transform = fish.direction > 0 ? 'scaleX(1)' : 'scaleX(-1)';
                }
            });
            
            // 继续动画
            requestAnimationFrame(animateFish);
        }
        
        // 抛竿
        function castLine() {
            if (isCasting) return;
            
            isCasting = true;
            castBtn.disabled = true;
            castBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 钓鱼中...';
            
            // 随机钓鱼时间（取决于竿等级）
            const fishingTime = Math.max(1000, 3000 - (rodLevel - 1) * 500);
            
            // 动画效果
            let lineLength = 0;
            const lineMaxLength = 300;
            const lineSpeed = 5;
            
            const castInterval = setInterval(() => {
                lineLength += lineSpeed;
                fishingLine.style.height = `${lineLength}px`;
                
                if (lineLength >= lineMaxLength) {
                    clearInterval(castInterval);
                    
                    // 等待鱼上钩
                    setTimeout(() => {
                        // 随机决定是否有鱼上钩（成功率取决于竿等级和饵料等级）
                        const successRate = 0.3 + (rodLevel - 1) * 0.1 + (baitLevel - 1) * 0.05;
                        const hasFish = Math.random() < successRate;
                        
                        if (hasFish) {
                            // 有鱼上钩，开始收线
                            reelIn();
                        } else {
                            // 没有鱼上钩
                            endFishing(false);
                        }
                    }, fishingTime);
                }
            }, 20);
            
            // 更新进度条
            let progress = 0;
            const progressInterval = setInterval(() => {
                progress += 100 / (fishingTime / 100);
                catchProgress.style.width = `${Math.min(progress, 100)}%`;
                
                if (progress >= 100) {
                    clearInterval(progressInterval);
                }
            }, 100);
        }
        
        // 收线
        function reelIn() {
            isReeling = true;
            
            // 动画效果
            let lineLength = parseInt(fishingLine.style.height) || 300;
            
            const reelInterval = setInterval(() => {
                lineLength -= 10;
                fishingLine.style.height = `${lineLength}px`;
                
                if (lineLength <= 0) {
                    clearInterval(reelInterval);
                    isReeling = false;
                    
                    // 随机选择一条鱼
                    if (fishInWater.length > 0) {
                        const randomIndex = Math.floor(Math.random() * fishInWater.length);
                        const fish = fishInWater[randomIndex];
                        catchFish(fish.element);
                    } else {
                        endFishing(false);
                    }
                }
            }, 50);
        }
        
        // 捕鱼
        function catchFish(fishElement) {
            if (!isCasting || isReeling) return;
            
            const fishTypeIndex = parseInt(fishElement.dataset.type);
            const fishValue = parseInt(fishElement.dataset.value);
            const fishType = fishTypes[fishTypeIndex];
            
            // 更新游戏数据
            money += fishValue;
            totalCaught++;
            
            // 添加到最近捕获
            recentCatches.unshift({
                name: fishType.name,
                value: fishValue,
                time: new Date().toLocaleTimeString()
            });
            
            // 只保留最近5条
            if (recentCatches.length > 5) {
                recentCatches.pop();
            }
            
            // 显示捕获消息
            showCatchMessage(`捕获 ${fishType.name}！ +$${fishValue}`);
            
            // 鱼被捕获的动画
            fishElement.classList.add('fish-caught');
            
            // 从数组中移除
            const fishIndex = fishInWater.findIndex(f => f.element === fishElement);
            if (fishIndex > -1) {
                fishInWater.splice(fishIndex, 1);
            }
            
            // 移除鱼元素
            setTimeout(() => {
                if (fishElement.parentNode) {
                    fishElement.parentNode.removeChild(fishElement);
                }
            }, 1500);
            
            // 结束钓鱼
            endFishing(true);
            
            // 保存游戏进度
            saveGame();
        }
        
        // 显示捕获消息
        function showCatchMessage(message) {
            catchMessage.textContent = message;
            catchMessage.style.display = 'block';
            
            setTimeout(() => {
                catchMessage.style.display = 'none';
            }, 2000);
        }
        
        // 结束钓鱼
        function endFishing(success) {
            isCasting = false;
            isReeling = false;
            
            // 重置钓鱼线
            fishingLine.style.height = '0';
            
            // 重置按钮
            castBtn.disabled = false;
            castBtn.innerHTML = '<i class="fas fa-water"></i> 抛竿钓鱼';
            
            // 重置进度条
            catchProgress.style.width = '0%';
            
            // 更新UI
            updateUI();
            
            // 如果成功且鱼少于3条，生成新鱼
            if (success && fishInWater.length < 3) {
                setTimeout(() => {
                    generateFish();
                }, 1000);
            }
        }
        
        // 更新UI
        function updateUI() {
            moneyElement.textContent = `$${money}`;
            totalCaughtElement.textContent = totalCaught;
            rodLevelElement.textContent = rodLevel;
            baitLevelElement.textContent = baitLevel;
            invRodLevelElement.textContent = rodLevel;
            invBaitLevelElement.textContent = baitLevel;
            
            // 更新最近捕获
            updateRecentCatches();
        }
        
        // 更新最近捕获显示
        function updateRecentCatches() {
            if (recentCatches.length === 0) {
                recentCatchesElement.innerHTML = '<p style="text-align: center; color: #888;">尚未捕获任何鱼</p>';
                return;
            }
            
            let html = '';
            recentCatches.forEach(catchItem => {
                html += `
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px; padding: 8px; background-color: #f0f9ff; border-radius: 8px;">
                    <div>
                        <strong>${catchItem.name}</strong>
                        <div style="font-size: 0.8rem; color: #666;">${catchItem.time}</div>
                    </div>
                    <div style="color: #4CAF50; font-weight: bold;">+$${catchItem.value}</div>
                </div>
                `;
            });
            
            recentCatchesElement.innerHTML = html;
        }
        
        // 设置商店
        function setupShop() {
            shopItemsContainer.innerHTML = '';
            
            shopItems.forEach(item => {
                const shopItem = document.createElement('div');
                shopItem.className = 'shop-item';
                shopItem.dataset.id = item.id;
                
                // 检查是否已购买或可购买
                const canAfford = money >= item.cost;
                const isPurchased = false; // 这里可以添加已购买检测逻辑
                
                shopItem.innerHTML = `
                    <div class="item-icon">
                        <i class="${item.icon}"></i>
                    </div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-description">${item.description}</div>
                    <div class="item-cost">$${item.cost}</div>
                    <button class="buy-btn" ${!canAfford ? 'disabled' : ''}>
                        ${canAfford ? '购买' : '资金不足'}
                    </button>
                `;
                
                // 添加购买事件
                const buyBtn = shopItem.querySelector('.buy-btn');
                buyBtn.addEventListener('click', () => buyItem(item));
                
                shopItemsContainer.appendChild(shopItem);
            });
        }
        
        // 购买物品
        function buyItem(item) {
            if (money < item.cost) {
                alert('资金不足！');
                return;
            }
            
            // 扣除金钱
            money -= item.cost;
            
            // 应用物品效果
            switch(item.type) {
                case 'rod':
                    rodLevel++;
                    break;
                case 'bait':
                    baitLevel++;
                    break;
                case 'net':
                    // 渔网效果：捕获多条鱼
                    if (fishInWater.length > 0) {
                        const fishToCatch = Math.min(3, fishInWater.length);
                        for (let i = 0; i < fishToCatch; i++) {
                            const randomIndex = Math.floor(Math.random() * fishInWater.length);
                            const fish = fishInWater[randomIndex];
                            const fishType = fishTypes[fish.type];
                            
                            money += fish.value;
                            totalCaught++;
                            
                            // 从数组中移除
                            fishInWater.splice(randomIndex, 1);
                            
                            // 移除元素
                            if (fish.element.parentNode) {
                                fish.element.classList.add('fish-caught');
                                setTimeout(() => {
                                    if (fish.element.parentNode) {
                                        fish.element.parentNode.removeChild(fish.element);
                                    }
                                }, 1000);
                            }
                        }
                        
                        showCatchMessage(`使用渔网捕获了${fishToCatch}条鱼！`);
                    }
                    break;
                case 'license':
                    // 钓鱼大师执照效果
                    rodLevel += 2;
                    baitLevel += 2;
                    break;
            }
            
            // 更新UI
            updateUI();
            
            // 重新生成鱼（如果升级了饵料）
            if (item.type === 'bait' || item.type === 'license') {
                generateFish();
            }
            
            // 更新商店
            setupShop();
            
            // 显示购买成功消息
            alert(`成功购买 ${item.name}！`);
            
            // 保存游戏
            saveGame();
        }
        
        // 保存游戏进度
        function saveGame() {
            const gameData = {
                money,
                totalCaught,
                rodLevel,
                baitLevel,
                recentCatches
            };
            
            localStorage.setItem('fishingGameData', JSON.stringify(gameData));
        }
        
        // 加载游戏进度
        function loadGame() {
            const savedData = localStorage.getItem('fishingGameData');
            
            if (savedData) {
                try {
                    const gameData = JSON.parse(savedData);
                    
                    money = gameData.money || money;
                    totalCaught = gameData.totalCaught || totalCaught;
                    rodLevel = gameData.rodLevel || rodLevel;
                    baitLevel = gameData.baitLevel || baitLevel;
                    recentCatches = gameData.recentCatches || recentCatches;
                    
                    updateUI();
                } catch (e) {
                    console.log('加载游戏数据失败:', e);
                }
            }
        }
        
        // 事件监听
        castBtn.addEventListener('click', castLine);
        shopBtn.addEventListener('click', () => {
            shopModal.style.display = 'flex';
            setupShop();
        });
        
        closeShopBtn.addEventListener('click', () => {
            shopModal.style.display = 'none';
        });
        
        // 点击模态框外部关闭
        window.addEventListener('click', (e) => {
            if (e.target === shopModal) {
                shopModal.style.display = 'none';
            }
        });
        
        // 初始化游戏
        window.addEventListener('load', initGame);
        
        // 添加键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'Spacebar') {
                // 空格键抛竿
                if (!isCasting) {
                    castLine();
                }
                e.preventDefault();
            } else if (e.key === 'Escape') {
                // ESC键关闭商店
                shopModal.style.display = 'none';
            }
        });
        
        // 添加游戏说明提示
        setTimeout(() => {
            if (totalCaught === 0) {
                alert('欢迎来到钓鱼大亨！\n\n游戏说明：\n1. 点击"抛竿钓鱼"按钮开始钓鱼\n2. 等待鱼上钩，然后点击鱼进行捕获\n3. 用赚取的钱在商店升级装备\n4. 捕获更稀有的鱼获得更多金钱\n\n祝你好运！');
            }
        }, 1000);
    </script>
</body>
</html>
